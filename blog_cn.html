<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 - Qafield</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icon.jpg" type="image/jpeg">
    <style>
        /* 页面特定样式 */
        main.blog-main {
            margin-top: 80px;
        }

        .blog-header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .blog-header h1 {
            font-size: 2.5em;
            color: #333;
            margin: 0 0 12px;
            font-family: 'Georgia', serif;
        }

        .blog-header p {
            color: #555;
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .blog-header .accent {
            width: 80px;
            height: 2px;
            background: #cdbb8f;
            margin: 16px auto 0;
            opacity: 0.8;
        }

        .blog-grid {
            padding: 0 20px 40px;
        }

        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 24px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .back-home:hover {
            background: #555;
        }

        .back-home-wrapper {
            text-align: center;
            padding: 0 20px 40px;
        }

        @media (max-width: 768px) {
            .blog-header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index_cn.html"><img src="images/qafield_logo.jpg" alt="Qafield 标志"></a>
            </div>
            <ul class="nav-links">
                <li><a href="index_cn.html#about-us">关于我们</a></li>
                <li><a href="index_cn.html#our-services">我们的服务</a></li>
                <li><a href="apps_cn.html">我们的应用</a></li>
                <li><a href="blog_cn.html" style="opacity: 1;">博客</a></li>
                <li><a href="index_cn.html#contact-us">联系我们</a></li>
            </ul>
            <a href="blog.html" class="language-switcher">
                <span>EN</span>
            </a>
        </nav>
    </header>

    <main class="blog-main">
        <section class="services-section">
            <div class="blog-header">
                <h1>我们的博客</h1>
                <p>来自 Qafield 团队的见解、更新和故事，涵盖质量检验、家具行业趋势等。</p>
                <div class="accent"></div>
            </div>
            <div id="blog-grid" class="blog-grid">
                <!-- Blog posts will be dynamically loaded from blog-data.js -->
            </div>
            <div class="back-home-wrapper">
                <a href="index_cn.html" class="back-home">← 返回首页</a>
            </div>
        </section>
    </main>

    <footer>
        <p>Qafield 技术服务有限公司 <span id="year"></span> 版权所有。</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
    <script src="blog-cn/blog-data.js"></script>
    <script src="blog-cn/blog.js"></script>
</body>
</html>
