<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的应用 - Qafield</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/icon.jpg" type="image/jpeg">
    <style>
        /* 页面特定样式 - 覆盖 main 的默认边距，使 App 区块更突出 */
        main.apps-main {
            margin-top: 80px;
        }

        /* App 页面标题区域 */
        .apps-header {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .apps-header h1 {
            font-size: 2.5em;
            color: #333;
            margin: 0 0 12px;
            font-family: 'Georgia', serif;
        }

        .apps-header p {
            color: #555;
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .apps-header .accent {
            width: 80px;
            height: 2px;
            background: #cdbb8f;
            margin: 16px auto 0;
            opacity: 0.8;
        }

        /* 确保 App Grid 在独立页面中有合适的间距 */
        .app-grid {
            padding: 0 20px 40px;
        }

        /* 返回首页链接 */
        .back-home {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 24px;
            background: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .back-home:hover {
            background: #555;
        }

        .back-home-wrapper {
            text-align: center;
            padding: 0 20px 40px;
        }

        @media (max-width: 768px) {
            .apps-header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index_cn.html"><img src="images/qafield_logo.jpg" alt="Qafield 标志"></a>
            </div>
            <ul class="nav-links">
                <li><a href="index_cn.html#about-us">关于我们</a></li>
                <li><a href="index_cn.html#our-services">我们的服务</a></li>
                <li><a href="apps_cn.html" style="opacity: 1;">我们的应用</a></li>
                <li><a href="blog_cn.html">博客</a></li>
                <li><a href="index_cn.html#contact-us">联系我们</a></li>
            </ul>
            <a href="apps.html" class="language-switcher">
                <span>EN</span>
            </a>
        </nav>
    </header>

    <main class="apps-main">
        <section class="services-section">
            <div class="apps-header">
                <h1>我们的应用</h1>
                <p>我们致力于为质检场景开发各种应用，并免费提供给家具及相关行业的朋友们使用。</p>
                <div class="accent"></div>
            </div>
            <div id="app-grid" class="app-grid">
                <!-- App entries will be dynamically loaded from app.json -->
            </div>
            <div class="back-home-wrapper">
                <a href="index_cn.html" class="back-home">← 返回首页</a>
            </div>
        </section>
    </main>

    <footer>
        <p>Qafield 技术服务有限公司 <span id="year"></span> 版权所有。</p>
    </footer>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
    <script src="app-cn/app-data.js"></script>
    <script src="app-cn/app.js"></script>
</body>
</html>
